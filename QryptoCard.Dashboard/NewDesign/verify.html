<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/png" href="images/kash-logo.png?v=2" />
<link rel="apple-touch-icon" href="images/kash-logo.png?v=2" />
<meta name="theme-color" content="#05070a" />
<title>Verify your email &mdash; Kash</title>
<meta name="description" content="Enter the 6-digit code we sent to your email to finish signing in to Kash." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="premium.css?v=7" />
<link rel="stylesheet" href="app.css?v=2" />
</head>
<body>
<div class="bg-fx"></div>
<div class="grain"></div>

<div class="otp-wrap">
  <a class="brand otp-home" href="premium.html"><img class="brand-logo" src="images/kash-logo.png?v=2" alt="Kash logo" /> Kash</a>

  <div class="otp-card">
    <div class="otp-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
    </div>
    <h1>Verify your email</h1>
    <p class="otp-sub">Enter the 6-digit code we sent to</p>
    <p class="otp-sub"><b id="dest">you@email.com</b></p>

    <form id="otp-form" novalidate>
      <div class="otp-inputs" id="otp">
        <input type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="1" aria-label="Digit 1" />
        <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 2" />
        <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 3" />
        <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 4" />
        <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 5" />
        <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 6" />
      </div>
      <div class="otp-error" id="err"></div>
      <div class="otp-actions">
        <button type="submit" class="btn btn-cyan btn-block btn-lg" id="verify-btn">Verify &amp; continue
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </button>
      </div>
    </form>

    <p class="otp-resend">Didn't get the code? <button type="button" id="resend" disabled>Resend in <span id="count">30</span>s</button></p>
    <p class="otp-foot">Wrong email? <a href="login-v2.html">Back to sign in</a></p>
  </div>
</div>

<script src="verify.js"></script>
</body>
</html>
